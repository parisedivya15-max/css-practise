<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style> 
        .card1{
            width: 300px;
            height: 400px;
            overflow: hidden;
              position: relative;
              border-radius: 30px;

        }
        .card1 img{
            width: 100%;
            height: 100%;
            object-fit: cover;
          

        }
        .card-details{
            position: absolute;
            bottom: 0%;
            left:0%;
            width: 100%;
            height: 60%;
            background-color: rgba(0,0,0,0.5);
            color:white;
            padding: 20px;
            transform: translatey(100%);

        }
        .card1:hover .card-details{
            transform: translatey(0%);
            transition-duration: 0.5s;
        }
    </style>
</head>
<body>
    <div class="card1"> 
        <img src="https://img.freepik.com/free-photo/woman-beach-with-her-baby-enjoying-sunset_52683-144131.jpg?size=626&ext=jpg" alt=" Scarlet Macaw">
        
        <div class="card-details">
            <h2>Scarlet Macaw</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
            <button>Explore</button>
        </div>
    </div>
</body>
</html>
